name: Deploy ES Publishing to LIVE

on:
  push:
    branches:
      - LIVE

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare .ssh directory and Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.FTP_HOST }} >> ~/.ssh/known_hosts

      - name: Add SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

            - name: Deploy files with rsync (no vendor)
        env:
          SSH_USER: ${{ secrets.FTP_USER }}
          SSH_HOST: ${{ secrets.FTP_HOST }}
          SSH_PATH: ${{ secrets.PATH_LIVE_HTDOCS }}
        run: |
          rsync -az \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='.ddev' \
            --exclude='*.jsx' \
            --exclude='.env*' \
            --exclude='.vscode' \
            --exclude='tests/' \
            --exclude='web/assets/' \
            --exclude='web/cpresources/' \
            --exclude='web/imager/' \
            --exclude='node_modules/' \
            --exclude='storage/' \
            --exclude='*.log' \
            --exclude='vendor/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ "$SSH_USER@$SSH_HOST:$SSH_PATH"

      - name: Install Composer dependencies on remote
        env:
          SSH_USER: ${{ secrets.FTP_USER }}
          SSH_HOST: ${{ secrets.FTP_HOST }}
          APP_PATH: ${{ secrets.PATH_LIVE_APP }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "cd '$APP_PATH' && composer install --no-dev --prefer-dist --no-progress --no-interaction"

      - name: Apply Craft project config and run migrations (remote)
        env:
          SSH_USER: ${{ secrets.FTP_USER }}
          SSH_HOST: ${{ secrets.FTP_HOST }}
          APP_PATH: ${{ secrets.PATH_LIVE_APP }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "cd '$APP_PATH' && php craft migrate/all --no-interaction && php craft project-config/apply --force --no-interaction"