name: Deploy Craft CMS to LIVE on Green Hosting

on:
  push:
    branches: [ LIVE ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.FTP_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync deploy (no vendor)
        env:
          SSH_USER: ${{ secrets.GREEN_USER }}
          SSH_HOST: ${{ secrets.GREEN_HOST }}
          SSH_PATH: ${{ secrets.GREEN_SSH_PATH }}
        run: |
          set -euxo pipefail
          rsync -az --delete \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='.ddev' \
            --exclude='.env*' \
            --exclude='.vscode' \
            --exclude='tests/' \
            --exclude='web/assets/' \
            --exclude='web/cpresources/' \
            --exclude='web/imager/' \
            --exclude='node_modules/' \
            --exclude='storage/' \
            --exclude='*.log' \
            --exclude='vendor/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ "${SSH_USER}@${SSH_HOST}:${SSH_PATH}"

      - name: Composer install (remote)
        env:
          SSH_USER: ${{ secrets.GREEN_USER }}
          SSH_HOST: ${{ secrets.GREEN_HOST }}
          APP_PATH: ${{ secrets.GREEN_APP_PATH }}
        run: |
          set -euxo pipefail
          ssh "${SSH_USER}@${SSH_HOST}" "cd '${APP_PATH}' && composer install --no-dev --prefer-dist --no-progress --no-interaction"

      # - name: Apply project config (remote)
