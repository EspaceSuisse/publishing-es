        elements:
          -
            content: "# Bild\r\n- Lange Seite min. `2400px`\r\n- Dateigrösse Max: `1.5mb`\r\n- JPG Compression: `60`\r\n- Verwende [Käspus Image Resizer](https://kaspar-allenbach.github.io/image-resizer/) oder jedes handelsübliche Bildprogramm.\r\n- Dateiname: Schriebe die quelle als Kürzel in den Dateinamen. Du wirst nie wieder herausfinden, wer das Bild gemacht hat und wo du es heruntergeladen hast. Z.b. `DSC_003-Hans_Muster-flickr-CC3` Notiere auch Sachen wie Creative Commons Version und solches zeug. Glaub mir: Du wirst es nie wieder finden.\r\n\r\n# Bildquelle\r\nSämtliche Einstellungen für Bildquelle sind mit einem Doppelklick auf die Bilddatei erreichbar\r\n\r\n- Bitte keine Bildquellen in das Legendenfeld schreiben\r\n- Der Bildtitel wird angezeigt, wenn man mit der Maus über das Bild hovert. Ansonsten ist der Bildtitel nicht in Verwendung\r\n\r\n# Fokuspunkt\r\n- Um den Beschnitt zu kontrollieren, lässt sich ein Fokuspunkt setzen. Damit wird das Zentrum des Bildbeschnitts bestimmt, sollte dieser nicht in der Mitte sein.\r\n\r\n1. Doppelklick auf das Bild\r\n2. Im Seitenpanel wieder über das Bild hovern und `Edit Image` aus wählen\r\n3. auf `Focal Point` klicken\r\n4. Focal Point auf den gewünschten Ort schieben.\r\n5. Save"
