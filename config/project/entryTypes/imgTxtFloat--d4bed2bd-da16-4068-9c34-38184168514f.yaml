        elements:
          -
            content: "# Content einfügen\r\nMit diesem Element kannst du Text um ein Bild fliessen lassen. Lade dein gewünschtes Bild hoch wie du das sonst im normalen Bild Element auch machst. Füge die Bildlegende hinzu und den Lauftext, welcher das Bild umfliessen soll.\r\n\r\n# Umfluss\r\nNur zum umfluss. Gehe auf das `Layout` Panel. Wenn du hier alle Einstellung so lässt wie sie am Anfang sind, gibt es keinen Bildumfluss. Das Bild hat die normale kleine Textbreite.\r\n\r\nUm den Umfluss zu erreichen, ändere den Slider `Bildgrösse`. Am besten du gehst in den Preview Mode, dann siehst du direkt, was dabei herauskommt. \r\n\r\n# Layout\r\n- Auf Desktop hat es `12 spalten`.\r\n- Stellst du also `Bildgrösse` auf `12` dann läuft das Bild über die volle Breite.\r\n- Stellst du `Bildgrösse` auf `6` läuft das Bild auf die halbe Breite usw.\r\n\r\n## Grid Span & Grid Start\r\n- `Grid Span` & `Grid Start` definieren die breite über die 12 Spalten im gesamten. Soll heissen Bild. Text und Bildlegende, wärhend `Bildgrösse` nur die `Bildgrösse` kontrolliert.\r\n\r\n# Bild Position\r\n- Mit dem Schalter `Bildposition` kannst du das Bild auf die rechte oder linke seite schieben.\r\n\r\n> Am besten ist, das ganze im Preview mode zu machen. Dann siehst du gleich was passiert und musst dich nicht um genaue nummern kümmern\r\n\r\n# Mobile Ansicht\r\n- In der Mobilen Ansicht wird das ganze Ignoriert und einfach auf eine Spalte heruntergebrochen."
